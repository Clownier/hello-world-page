<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .card {
            text-align: center;
            color: #fff;
            z-index: 10;
        }
        h1 {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        .emoji {
            font-size: 3rem;
            display: inline-block;
            margin-left: 0.5rem;
            -webkit-text-fill-color: initial;
        }
        p {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
        }
        .datetime {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 10px;
            z-index: 10;
            background: linear-gradient(90deg, 
                #ff0000, #ff7f00, #ffff00, #00ff00, 
                #0000ff, #4b0082, #9400d3, #ff1493, 
                #ff1493, #9400d3, #4b0082, #0000ff,
                #00ff00, #ffff00, #ff7f00, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: laserMove 4s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.6));
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes laserMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .rainbow-dot {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World<span class="emoji">🌍</span></h1>
        <p>It works!</p>
    </div>
    <div class="datetime">
        <span id="date"></span>
        <span> | </span>
        <span id="time"></span>
    </div>
    <script>
        // 更新日期时间
        function updateDateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const dateStr = now.toLocaleDateString('zh-CN', options);
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('date').textContent = dateStr;
            document.getElementById('time').textContent = timeStr;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 鼠标彩虹拖尾特效
        const rainbowColors = [
            '#ff0000', '#ff7f00', '#ffff00', '#00ff00',
            '#0000ff', '#4b0082', '#9400d3', '#ff1493', '#00ffff'
        ];
        let colorIndex = 0;

        document.addEventListener('mousemove', (e) => {
            const dot = document.createElement('div');
            dot.className = 'rainbow-dot';
            dot.style.left = e.clientX - 6 + 'px';
            dot.style.top = e.clientY - 6 + 'px';
            dot.style.backgroundColor = rainbowColors[colorIndex];
            dot.style.boxShadow = `0 0 10px ${rainbowColors[colorIndex]}, 0 0 20px ${rainbowColors[colorIndex]}`;
            
            document.body.appendChild(dot);
            colorIndex = (colorIndex + 1) % rainbowColors.length;
            
            setTimeout(() => dot.remove(), 1000);
        });
    </script>
</body>
</html>
