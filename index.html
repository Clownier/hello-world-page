<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主标题 -->
    <div class="card">
        <h1>Hello World<span class="emoji">🌍</span></h1>
        <p class="subtitle">It works!</p>
    </div>
    
    <!-- 日期时间 -->
    <div class="datetime">
        <span id="date"></span>
        <span> | </span>
        <span id="time"></span>
    </div>
    
    <!-- 游戏按钮：三个并排 -->
    <div class="games-section">
        <div class="games-title">🎮 点击玩小游戏</div>
        <div class="game-buttons">
            <button class="game-btn btn-fireworks" onclick="startFireworks()">🎆 烟花</button>
            <button class="game-btn btn-bubble" onclick="startBubble()">🫧 泡泡</button>
            <button class="game-btn btn-reaction" onclick="startReaction()">⚡ 反应</button>
        </div>
    </div>
    
    <!-- 游戏容器 -->
    <div class="game-container" id="gameContainer"></div>
    
    <!-- 右下角信息 -->
    <div class="footer-info">
        <div class="ip-location" id="ipLocation">📍 正在获取位置...</div>
        <span>v3.1.0</span> | <a href="https://github.com/Clownier/hello-world-page" target="_blank">GitHub</a>
    </div>
    
    <script src="js/games.js"></script>
</body>
</html>
