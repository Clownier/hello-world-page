<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            z-index: 10;
        }
        .datetime {
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 10px;
            margin-top: 10px;
            z-index: 10;
        }
        .date {
            color: #ffd700;
        }
        .time {
            color: #00ff88;
        }
        .rainbow-dot {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <div class="datetime">
        <span class="date" id="date"></span>
        <span> | </span>
        <span class="time" id="time"></span>
    </div>
    <script>
        // 更新日期时间
        function updateDateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const dateStr = now.toLocaleDateString('zh-CN', options);
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('date').textContent = dateStr;
            document.getElementById('time').textContent = timeStr;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 鼠标彩虹拖尾特效
        const rainbowColors = [
            '#ff0000', // 红
            '#ff7f00', // 橙
            '#ffff00', // 黄
            '#00ff00', // 绿
            '#0000ff', // 蓝
            '#4b0082', // 靛
            '#9400d3', // 紫
            '#ff1493', // 粉
            '#00ffff', // 青
        ];
        let colorIndex = 0;

        document.addEventListener('mousemove', (e) => {
            const dot = document.createElement('div');
            dot.className = 'rainbow-dot';
            dot.style.left = e.clientX - 6 + 'px';
            dot.style.top = e.clientY - 6 + 'px';
            dot.style.backgroundColor = rainbowColors[colorIndex];
            dot.style.boxShadow = `0 0 10px ${rainbowColors[colorIndex]}, 0 0 20px ${rainbowColors[colorIndex]}`;
            
            document.body.appendChild(dot);
            
            colorIndex = (colorIndex + 1) % rainbowColors.length;
            
            setTimeout(() => {
                dot.remove();
            }, 1000);
        });
    </script>
</body>
</html>
