<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        .card {
            text-align: center;
            color: #fff;
            z-index: 10;
        }
        h1 {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        .emoji {
            font-size: 3rem;
            display: inline-block;
            margin-left: 0.5rem;
            -webkit-text-fill-color: initial;
        }
        p {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.6);
        }
        .datetime {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 10px;
            z-index: 10;
            background: linear-gradient(90deg, 
                #ff0000, #ff7f00, #ffff00, #00ff00, 
                #0000ff, #4b0082, #9400d3, #ff1493, 
                #ff1493, #9400d3, #4b0082, #0000ff,
                #00ff00, #ffff00, #ff7f00, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: laserMove 4s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.6));
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        @keyframes laserMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .rainbow-dot {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.3); }
        }
        .version-info {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            z-index: 100;
        }
        .version-info a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
        }
        .version-info a:hover {
            color: #00d2ff;
        }

        /* 游戏区域 */
        .games-section {
            margin-top: 2rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .games-title {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
        }
        .game-buttons {
            display: flex;
            gap: 15px;
        }
        .game-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .game-btn:hover {
            transform: scale(1.08);
        }
        .game-btn.fireworks { background: linear-gradient(135deg, #ff6b6b, #feca57); color: #fff; }
        .game-btn.bubble { background: linear-gradient(135deg, #5f27cd, #341f97); color: #fff; }
        .game-btn.reaction { background: linear-gradient(135deg, #00d2d3, #01a3a4); color: #fff; }
        
        /* 游戏容器 */
        .game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        .game-container.active {
            pointer-events: auto;
            background: rgba(0,0,0,0.3);
        }
        
        /* 烟花效果 */
        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        /* 泡泡游戏 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.1s;
        }
        .bubble:hover {
            transform: scale(1.15);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bubble-pop {
            animation: pop 0.3s forwards;
        }
        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .game-score {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 60;
        }
        
        /* 反应游戏 */
        .reaction-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            transition: background-color 0.1s;
            z-index: 60;
        }
        .reaction-wait { background: #ee5253; color: #fff; }
        .reaction-go { background: #10ac84; color: #fff; }
        .reaction-result { background: #5f27cd; color: #fff; }
        
        /* 分数弹出 */
        .score-popup {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: scoreFloat 1s forwards;
            z-index: 100;
        }
        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        
        /* 关闭按钮 */
        .close-game {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            pointer-events: auto;
            z-index: 100;
            transition: background 0.3s;
        }
        .close-game:hover {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World<span class="emoji">🌍</span></h1>
        <p>It works!</p>
    </div>
    <div class="datetime">
        <span id="date"></span>
        <span> | </span>
        <span id="time"></span>
    </div>
    
    <!-- 游戏按钮 -->
    <div class="games-section">
        <div class="games-title">🎮 点击玩小游戏</div>
        <div class="game-buttons">
            <button class="game-btn fireworks" onclick="startFireworks()">🎆 烟花</button>
            <button class="game-btn bubble" onclick="startBubbleGame()">🫧 泡泡</button>
            <button class="game-btn reaction" onclick="startReactionGame()">⚡ 反应</button>
        </div>
    </div>
    
    <!-- 游戏容器 -->
    <div class="game-container" id="gameContainer"></div>
    
    <script>
        // 更新日期时间
        function updateDateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            const dateStr = now.toLocaleDateString('zh-CN', options);
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('date').textContent = dateStr;
            document.getElementById('time').textContent = timeStr;
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 鼠标彩虹拖尾特效
        const rainbowColors = [
            '#ff0000', '#ff7f00', '#ffff00', '#00ff00',
            '#0000ff', '#4b0082', '#9400d3', '#ff1493', '#00ffff'
        ];
        let colorIndex = 0;

        document.addEventListener('mousemove', (e) => {
            const dot = document.createElement('div');
            dot.className = 'rainbow-dot';
            dot.style.left = e.clientX - 6 + 'px';
            dot.style.top = e.clientY - 6 + 'px';
            dot.style.backgroundColor = rainbowColors[colorIndex];
            dot.style.boxShadow = `0 0 10px ${rainbowColors[colorIndex]}, 0 0 20px ${rainbowColors[colorIndex]}`;
            
            document.body.appendChild(dot);
            colorIndex = (colorIndex + 1) % rainbowColors.length;
            
            setTimeout(() => dot.remove(), 1000);
        });

        // 游戏容器
        const gameContainer = document.getElementById('gameContainer');
        let currentGame = null;
        let fireworksInterval = null;
        let bubbleInterval = null;
        let reactionTimeout = null;
        let bubbleTimeout = null;

        // 清除游戏
        function clearGame() {
            if (fireworksInterval) { clearInterval(fireworksInterval); fireworksInterval = null; }
            if (bubbleInterval) { clearInterval(bubbleInterval); bubbleInterval = null; }
            if (reactionTimeout) { clearTimeout(reactionTimeout); reactionTimeout = null; }
            if (bubbleTimeout) { clearTimeout(bubbleTimeout); bubbleTimeout = null; }
            
            gameContainer.innerHTML = '';
            gameContainer.classList.remove('active');
            currentGame = null;
        }

        // 添加关闭按钮
        function addCloseButton() {
            const btn = document.createElement('button');
            btn.className = 'close-game';
            btn.textContent = '×';
            btn.onclick = clearGame;
            gameContainer.appendChild(btn);
        }

        // ========== 烟花游戏 ==========
        function startFireworks() {
            clearGame();
            currentGame = 'fireworks';
            gameContainer.classList.add('active');
            addCloseButton();
            
            // 点击释放烟花
            gameContainer.onclick = (e) => {
                if (e.target.classList.contains('close-game')) return;
                createFirework(e.clientX, e.clientY);
            };
            
            // 自动持续释放烟花 (每1-2秒)
            fireworksInterval = setInterval(() => {
                createFirework(
                    Math.random() * window.innerWidth,
                    Math.random() * window.innerHeight * 0.7
                );
            }, 1200);
            
            // 初始放几个烟花
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight * 0.5
                    );
                }, i * 200);
            }
        }

        function createFirework(x, y) {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#1dd1a1', '#5f27cd', '#fff'];
            const particleCount = 30 + Math.random() * 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.boxShadow = `0 0 6px currentColor, 0 0 12px currentColor`;
                
                const angle = (Math.PI * 2 / particleCount) * i + Math.random() * 0.2;
                const velocity = 60 + Math.random() * 80;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                gameContainer.appendChild(particle);
                
                let posX = x;
                let posY = y;
                let opacity = 1;
                let frame = 0;
                
                function animate() {
                    frame++;
                    posX += vx / 30;
                    posY += vy / 30 + frame * 0.15; // 重力
                    opacity -= 0.018;
                    
                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.opacity = opacity;
                    particle.style.transform = `scale(${opacity})`;
                    
                    if (opacity > 0) {
                        requestAnimationFrame(animate);
                    } else {
                        particle.remove();
                    }
                }
                requestAnimationFrame(animate);
            }
        }

        // ========== 泡泡游戏 ==========
        let bubbleScore = 0;

        function startBubbleGame() {
            clearGame();
            currentGame = 'bubble';
            bubbleScore = 0;
            gameContainer.classList.add('active');
            addCloseButton();
            
            // 显示分数
            const scoreDisplay = document.createElement('div');
            scoreDisplay.className = 'game-score';
            scoreDisplay.id = 'bubbleScore';
            scoreDisplay.textContent = '🫧 分数: 0 | ⏱️ 30秒';
            gameContainer.appendChild(scoreDisplay);
            
            // 生成泡泡
            bubbleInterval = setInterval(spawnBubble, 600);
            
            // 30秒后结束
            let timeLeft = 30;
            bubbleTimeout = setInterval(() => {
                timeLeft--;
                const score = document.getElementById('bubbleScore');
                if (score) score.textContent = `🫧 分数: ${bubbleScore} | ⏱️ ${timeLeft}秒`;
                
                if (timeLeft <= 0) {
                    clearInterval(bubbleInterval);
                    clearInterval(bubbleTimeout);
                    alert(`🎉 游戏结束！你得了 ${bubbleScore} 分！`);
                    clearGame();
                }
            }, 1000);
        }

        function spawnBubble() {
            if (currentGame !== 'bubble') return;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            const size = 50 + Math.random() * 30;
            // 泡泡在游戏区域内，避开顶部按钮
            const x = 20 + Math.random() * (window.innerWidth - size - 40);
            const y = 120 + Math.random() * (window.innerHeight - size - 180);
            
            const emojis = ['🫧', '🎈', '🔴', '🟡', '🟢', '🔵', '🟣'];
            const colors = ['rgba(255,107,107,0.7)', 'rgba(254,202,87,0.7)', 'rgba(29,209,153,0.7)', 'rgba(72,219,251,0.7)', 'rgba(255,154,243,0.7)'];
            
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
            bubble.style.boxShadow = `0 4px 15px rgba(0,0,0,0.3)`;
            bubble.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            bubble.onclick = (e) => {
                e.stopPropagation();
                popBubble(bubble);
            };
            
            gameContainer.appendChild(bubble);
            
            // 4秒后消失
            setTimeout(() => {
                if (bubble.parentNode) bubble.remove();
            }, 4000);
        }

        function popBubble(bubble) {
            bubble.classList.add('bubble-pop');
            bubbleScore += 10;
            
            const score = document.getElementById('bubbleScore');
            if (score) {
                const text = score.textContent;
                score.textContent = text.replace(/分数: \d+/, `分数: ${bubbleScore}`);
            }
            
            // 弹出分数
            showScorePopup(bubble, '+10', '#1dd1a1');
            
            setTimeout(() => bubble.remove(), 300);
        }

        function showScorePopup(element, text, color) {
            const rect = element.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.style.left = rect.left + rect.width/2 + 'px';
            popup.style.top = rect.top + 'px';
            popup.style.color = color;
            popup.style.fontSize = '1.5rem';
            popup.textContent = text;
            gameContainer.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // ========== 反应游戏 ==========
        let reactionStartTime = 0;

        function startReactionGame() {
            clearGame();
            currentGame = 'reaction';
            gameContainer.classList.add('active');
            addCloseButton();
            
            const box = document.createElement('div');
            box.className = 'reaction-box reaction-wait';
            box.id = 'reactionBox';
            box.innerHTML = '<div style="font-size:1.3rem">等待绿色...</div><div style="font-size:0.9rem;margin-top:10px;opacity:0.8">点击开始</div>';
            gameContainer.appendChild(box);
            
            box.onclick = startReactionRound;
        }

        function startReactionRound() {
            const box = document.getElementById('reactionBox');
            if (!box) return;
            
            box.className = 'reaction-box reaction-wait';
            box.innerHTML = '<div style="font-size:1.5rem">等待...</div>';
            box.onclick = null;
            
            const delay = 1000 + Math.random() * 3000;
            
            reactionTimeout = setTimeout(() => {
                box.className = 'reaction-box reaction-go';
                box.innerHTML = '<div style="font-size:2rem">点击!</div>';
                reactionStartTime = Date.now();
                box.onclick = showReactionResult;
            }, delay);
            
            // 点击太早
            box.onclick = () => {
                if (box.className.includes('reaction-wait') && !box.className.includes('reaction-go')) {
                    clearTimeout(reactionTimeout);
                    box.className = 'reaction-box reaction-result';
                    box.innerHTML = '<div style="font-size:1.3rem">太早了! 😅</div><div style="font-size:0.9rem;margin-top:10px">点击重试</div>';
                    box.onclick = startReactionRound;
                }
            };
        }

        function showReactionResult() {
            const reactionTime = Date.now() - reactionStartTime;
            const box = document.getElementById('reactionBox');
            if (!box) return;
            
            box.className = 'reaction-box reaction-result';
            box.innerHTML = `<div style="font-size:1.8rem">${reactionTime}ms</div><div style="font-size:1rem;margin-top:10px">${getReactionMessage(reactionTime)}</div><div style="font-size:0.8rem;margin-top:15px;opacity:0.8">点击再试</div>`;
            box.onclick = startReactionRound;
        }

        function getReactionMessage(ms) {
            if (ms < 200) return '⚡ 闪电般!';
            if (ms < 300) return '🔥 超快!';
            if (ms < 400) return '👍 很好!';
            if (ms < 500) return '😊 还不错';
            return '🐢 可以更快哦';
        }
    </script>
    <div class="version-info">
        <span>v2.1.0</span> | <a href="https://github.com/Clownier/hello-world-page" target="_blank">GitHub</a>
    </div>
</body>
</html>
